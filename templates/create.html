{% extends "base.html" %}

{% block title %}morsels{% endblock %}

{% block content %}
<!-- Inline editor -->
<div id="editor" class="mb-6">
    <!-- Collapsed state -->
    <div id="editor-collapsed" onclick="expandEditor()"
         class="border border-gray-200 rounded-md px-4 py-3 flex items-center gap-3 cursor-pointer hover:border-gray-300 transition-colors">
        <img src="/avatar/{{ g.user.did }}" alt="" class="w-6 h-6 rounded-full bg-gray-100 shrink-0">
        <span class="text-sm text-gray-400">Paste or type something...</span>
    </div>

    <!-- Expanded state -->
    <form id="editor-expanded" method="post" action="{{ url_for('create_bite') }}" class="hidden">
        <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
        <div class="border border-indigo-300 ring-1 ring-indigo-300 rounded-md overflow-hidden">
            <div class="flex items-center gap-2 px-4 py-2.5 border-b border-gray-100 bg-white">
                <img src="/avatar/{{ g.user.did }}" alt="" class="w-5 h-5 rounded-full bg-gray-100 shrink-0">
                <input type="text" name="title" placeholder="title (optional)"
                       class="text-sm font-medium text-gray-900 placeholder-gray-400 bg-transparent border-0 p-0 focus:outline-none focus:ring-0 flex-1">
            </div>
            <!-- prettier-ignore -->
            <div class="bg-gray-50">
                <textarea id="editor-textarea" name="content" rows="8" required placeholder="Paste or type something..."
                          class="w-full px-4 py-3 bg-transparent border-0 text-sm text-gray-800 font-mono placeholder-gray-400 focus:outline-none focus:ring-0 leading-6 resize-none"></textarea>
            </div>
            <div class="flex items-center justify-between px-4 py-2.5 border-t border-gray-100 bg-white">
                <button type="button" onclick="collapseEditor()"
                        class="text-xs text-gray-400 hover:text-gray-600 transition-colors">cancel</button>
                <button type="submit"
                        class="bg-indigo-600 text-white px-4 py-1.5 rounded-md hover:bg-indigo-700 text-xs font-medium transition-colors">
                    share
                </button>
            </div>
        </div>
    </form>
</div>

<!-- Feed -->
{% if recent %}
<h2 class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">Recent Bites</h2>
{% include "_recent_bites.html" %}
{% endif %}

<script>
function expandEditor() {
    document.getElementById('editor-collapsed').classList.add('hidden');
    document.getElementById('editor-expanded').classList.remove('hidden');
    document.getElementById('editor-textarea').focus();
}
function collapseEditor() {
    document.getElementById('editor-expanded').classList.add('hidden');
    document.getElementById('editor-collapsed').classList.remove('hidden');
}
</script>
{% endblock %}
